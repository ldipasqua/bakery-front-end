<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <title>Bakery - Cadastro</title>
</head>

<body>
    <!-- Imagem superior (Banner) -->
    <div class="header-banner">
        <img src="img/banner.png" alt="Banner do bolo de chocolate e doce de leite">
    </div>

    <header>
        <h1>Bakery</h1>
    </header>

    <nav class="navbar">
        <ul class="navbar-list">
            <li class="navbar-item"><a href="index.html" class="navbar-link">Home</a></li>
        </ul>
    </nav>

    <section class="newClient">
        <input type="text" id="newNome" placeholder="Nome">
        <input type="text" id="newCpf" placeholder="CPF">
        <input type="text" id="newCelular" placeholder="Celular">
        <input type="text" id="newEndereco" placeholder="Endereço">
        <input type="text" id="newEmail" placeholder="Email">
        <button onclick="newClient()" class="addBtn">Cadastrar</button>
    </section>
    <script src="script.js"></script>

</body>

</html>
