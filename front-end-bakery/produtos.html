<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <title>Bakery - Produtos</title>
</head>

<body>
    <!-- Imagem superior (Banner) -->
    <div class="header-banner">
        <img src="img/banner.png" alt="Banner do bolo de chocolate e doce de leite">
    </div>
    <!-- Título -->
    <header>
        <h1>Bakery</h1>
    </header>
    <!-- Barra de navegação -->
    <nav class="navbar">
        <ul class="navbar-list">
            <li class="navbar-item"><a href="pedido_sucesso.html" class="navbar-link">Concluir pedido</a></li>
        </ul>
    </nav>

    <!-- Tabela com items existentes -->
    <div class="container-tabela">
        <table id="lista-produtos">
            <thead>
                <tr>
                    <th>Unidades</th>
                    <th>Nome</th>
                    <th>Sabor</th>
                    <th>Tamanho</th>
                    <th>Fatias</th>
                    <th>Valor</th>
                </tr>
            </thead>
        </table>
    </div>
    <div class="container-total">
        <div class="box-total">
            <span class="label-total">Total do Pedido:</span>
            <span id="preco-total" class="number-total">R$ 0,00</span>
            <button class="addBtn" onclick="calcularPrecoPedido()">
                Calcular total
            </button>
            <button class="addBtn" onclick="newPedido()">
                Fazer pedido
            </button>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
