<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <title>Bakery - Meus Pedidos</title>
</head>

<body>
    <!-- Imagem superior (Banner) -->
    <div class="header-banner">
        <img src="img/banner.png" alt="Banner do bolo de chocolate e doce de leite">
    </div>
    <!-- Título -->
    <header>
        <h1>Bakery</h1>
    </header>
    <!-- Barra de navegação -->
    <nav class="navbar">
        <ul class="navbar-list">
            <li class="navbar-item"><a href="index.html" class="navbar-link">Voltar</a></li>
        </ul>
    </nav>

    <div class="busca-container">
        <input type="text" id="busca-cpf" placeholder="Digite o CPF:">
        <button class="butao-pedidos" onclick="buscarPedidosCliente()">Buscar Pedidos</button>
    </div>

    <div class="tabela-container">
        <table id="lista-pedidos">
            <thead>
                <tr>
                    <th>CPF do Cliente</th>
                    <th>Preço Total</th>
                    <th>Data do Pedido</th>
                    <th>Data de Entrega</th>
                    <th>Endereço de Entrega</th>
                </tr>
            </thead>
        </table>
    </div>
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>
</body>

</html>
